name: Auto-Update from Upstream

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  auto-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Check for nanobot updates
        id: nanobot
        run: |
          CURRENT=$(grep 'ARG NANOBOT_VERSION=' Dockerfile | cut -d= -f2)
          LATEST=$(curl -sf https://api.github.com/repos/HKUDS/nanobot/releases/latest | jq -r '.tag_name')
          if [ -z "$LATEST" ]; then
            echo "Could not fetch latest nanobot release"
            echo "updated=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "current=${CURRENT} latest=${LATEST}"
          if [ "$CURRENT" != "$LATEST" ]; then
            sed -i "s/ARG NANOBOT_VERSION=${CURRENT}/ARG NANOBOT_VERSION=${LATEST}/" Dockerfile
            echo "updated=true" >> $GITHUB_OUTPUT
            echo "nanobot_change=${CURRENT} â†’ ${LATEST}" >> $GITHUB_OUTPUT
          else
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for Fabric updates
        id: fabric
        run: |
          CURRENT=$(grep 'ARG FABRIC_VERSION=' Dockerfile | cut -d= -f2)
          LATEST=$(curl -sf https://api.github.com/repos/danielmiessler/Fabric/releases/latest | jq -r '.tag_name')
          if [ -z "$LATEST" ]; then
            echo "Could not fetch latest Fabric release"
            echo "updated=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "current=${CURRENT} latest=${LATEST}"
          if [ "$CURRENT" != "$LATEST" ]; then
            sed -i "s/ARG FABRIC_VERSION=${CURRENT}/ARG FABRIC_VERSION=${LATEST}/" Dockerfile
            echo "updated=true" >> $GITHUB_OUTPUT
            echo "fabric_change=${CURRENT} â†’ ${LATEST}" >> $GITHUB_OUTPUT
          else
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for PinchTab updates
        id: pinchtab
        run: |
          CURRENT=$(grep 'ARG PINCHTAB_VERSION=' Dockerfile | cut -d= -f2)
          LATEST=$(curl -sf https://api.github.com/repos/pinchtab/pinchtab/releases/latest | jq -r '.tag_name')
          if [ -z "$LATEST" ]; then
            echo "Could not fetch latest PinchTab release"
            echo "updated=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "current=${CURRENT} latest=${LATEST}"
          if [ "$CURRENT" != "$LATEST" ]; then
            sed -i "s/ARG PINCHTAB_VERSION=${CURRENT}/ARG PINCHTAB_VERSION=${LATEST}/" Dockerfile
            echo "updated=true" >> $GITHUB_OUTPUT
            echo "pinchtab_change=${CURRENT} â†’ ${LATEST}" >> $GITHUB_OUTPUT
          else
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.nanobot.outputs.updated == 'true' || steps.fabric.outputs.updated == 'true' || steps.pinchtab.outputs.updated == 'true'
        run: |
          MSG="Auto-Update:"
          [ "${{ steps.nanobot.outputs.updated }}" == "true" ] && MSG="$MSG nanobot ${{ steps.nanobot.outputs.nanobot_change }}"
          [ "${{ steps.fabric.outputs.updated }}" == "true" ] && MSG="$MSG fabric ${{ steps.fabric.outputs.fabric_change }}"
          [ "${{ steps.pinchtab.outputs.updated }}" == "true" ] && MSG="$MSG pinchtab ${{ steps.pinchtab.outputs.pinchtab_change }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git commit -m "$MSG"
          git push